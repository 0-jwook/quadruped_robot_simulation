controller_manager:
  ros__parameters:
    update_rate: 100
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - front_left_shoulder_joint
      - front_left_leg_joint
      - front_left_foot_joint
      - front_right_shoulder_joint
      - front_right_leg_joint
      - front_right_foot_joint
      - rear_left_shoulder_joint
      - rear_left_leg_joint
      - rear_left_foot_joint
      - rear_right_shoulder_joint
      - rear_right_leg_joint
      - rear_right_foot_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      front_left_shoulder_joint: {p: 2000.0, i: 10.0, d: 50.0}
      front_left_leg_joint: {p: 2000.0, i: 10.0, d: 50.0}
      front_left_foot_joint: {p: 2000.0, i: 10.0, d: 50.0}
      front_right_shoulder_joint: {p: 2000.0, i: 10.0, d: 50.0}
      front_right_leg_joint: {p: 2000.0, i: 10.0, d: 50.0}
      front_right_foot_joint: {p: 2000.0, i: 10.0, d: 50.0}
      rear_left_shoulder_joint: {p: 2000.0, i: 10.0, d: 50.0}
      rear_left_leg_joint: {p: 2000.0, i: 10.0, d: 50.0}
      rear_left_foot_joint: {p: 2000.0, i: 10.0, d: 50.0}
      rear_right_shoulder_joint: {p: 2000.0, i: 10.0, d: 50.0}
      rear_right_leg_joint: {p: 2000.0, i: 10.0, d: 50.0}
      rear_right_foot_joint: {p: 2000.0, i: 10.0, d: 50.0}
