controller_manager:
  ros__parameters:
    update_rate: 1000
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

joint_trajectory_controller:
  ros__parameters:
    joints:
      - front_left_shoulder_joint
      - front_left_leg_joint
      - front_left_foot_joint
      - front_right_shoulder_joint
      - front_right_leg_joint
      - front_right_foot_joint
      - rear_left_shoulder_joint
      - rear_left_leg_joint
      - rear_left_foot_joint
      - rear_right_shoulder_joint
      - rear_right_leg_joint
      - rear_right_foot_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
    gains:
      front_right_shoulder_joint: {p: 400.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      front_left_shoulder_joint:  {p: 400.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      rear_left_shoulder_joint:   {p: 400.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      rear_right_shoulder_joint:  {p: 400.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      front_left_leg_joint:  {p: 350.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      front_right_leg_joint: {p: 350.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      rear_left_leg_joint:   {p: 350.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      rear_right_leg_joint:  {p: 350.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      front_left_foot_joint:  {p: 75.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      front_right_foot_joint: {p: 75.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      rear_left_foot_joint:   {p: 75.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
      rear_right_foot_joint:  {p: 75.0, i: 0.1, d: 1.0, ff_velocity_scale: 1.0}
